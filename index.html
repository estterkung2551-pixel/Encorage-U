<!DOCTYPE html>

<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Advisor</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(135deg,#111827,#1f2937);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    padding:20px;
}

.container{
    width:100%;
    max-width:700px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:30px;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:25px;
}

textarea{
    width:100%;
    height:150px;
    padding:15px;
    border:none;
    border-radius:12px;
    resize:none;
    font-size:16px;
}

button{
    width:100%;
    margin-top:15px;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.answer{
    margin-top:20px;
    background:rgba(255,255,255,0.08);
    padding:20px;
    border-radius:12px;
    line-height:1.8;
    display:none;
}
</style>

</head>

<body>

<div class="container">

<h1>💔 Love Advisor</h1>

<p class="subtitle">
เล่าเรื่องความรักมาได้เลย เดี๋ยวช่วยคิดแบบตรงไปตรงมา
</p>

<textarea
id="problem"
placeholder="เช่น เขาอ่านไม่ตอบมา 3 วันแล้ว..."
></textarea>

<button onclick="advice()">
ขอคำปรึกษา
</button>

<div class="answer" id="answer"></div>

</div>

<script>

const replies = [

"จากที่เล่ามา ดูเหมือนเธอกำลังพยายามอยู่ฝ่ายเดียว ถ้าคนสองคนอยากรักษาความสัมพันธ์จริง มันไม่ควรเป็นหน้าที่ของคนคนเดียว",

"อาจเจ็บที่จะยอมรับ แต่บางครั้งคนเราก็เปลี่ยนใจได้ คำถามสำคัญไม่ใช่ว่าเขารักเธอไหม แต่คือการกระทำของเขายังแสดงออกแบบนั้นอยู่หรือเปล่า",

"อย่ารีบโทษตัวเองทุกอย่าง ความสัมพันธ์ที่ดีต้องมีความพยายามจากทั้งสองฝ่าย",

"ถ้าเขาอยากคุย เขาจะหาทางคุย ถ้าเขาอยากเจอ เขาจะหาเวลาเจอ ลองดูการกระทำมากกว่าคำพูด",

"เธอควรให้คุณค่ากับตัวเองมากพอที่จะไม่ต้องคอยวิ่งตามคนที่ไม่ได้วิ่งมาหาเธอเหมือนกัน",

"บางครั้งการปล่อยมือ ไม่ได้แปลว่าแพ้ แต่มันแปลว่าเลือกปกป้องตัวเอง",

"ฟังดูแรงนะ แต่ถ้าต้องเดาตลอดว่าอีกฝ่ายรู้สึกยังไง ความสัมพันธ์นั้นอาจมีปัญหาเรื่องการสื่อสารอยู่แล้ว"

];

function advice(){

let text = document.getElementById("problem").value;

if(text.trim() === ""){
    alert("ลองเล่าเรื่องมาก่อน");
    return;
}

let randomReply =
replies[Math.floor(Math.random()*replies.length)];

document.getElementById("answer").style.display = "block";

document.getElementById("answer").innerHTML =
"<strong>คำแนะนำ:</strong><br><br>" + randomReply;

}

</script>

</body>
</html>
